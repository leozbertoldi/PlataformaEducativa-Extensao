<div class="flex flex-col items-center justify-center gap-8 min-h-[70vh]">

    <!-- PERGUNTA -->
    <h1 class="text-xl font-bold lg:text-4xl mt-8 text-center leading-snug">
        Selecione o número
        <span class="whitespace-nowrap text-white">
            {{ paridade | uppercase }}
        </span>
        de cor
        <span class="whitespace-nowrap" [style.color]="colorMap[titleColor]">
            {{ correctColor | uppercase }}
        </span>!
    </h1>

    <!-- OPÇÕES -->
    <div class="flex flex-wrap justify-center gap-2 p-4 w-full max-w-5xl mx-auto">
        @for (number of numbers; track $index) {
            <button
                (click)="checkAnswer({ number: number.number, color: number.color, isEven: number.isEven })"
                [style.color]="colorMap[number.color]"
                class="w-[30%] md:w-[30%] lg:w-[22%] 
                    rounded-xl text-5xl font-bold
                    hover:scale-105 active:scale-95 transition 
                    cursor-pointer lg:text-6xl">
                
                {{ number.number }}
            </button>
        }
    </div>

</div>

@if (isPlaying() || wrongAnswer()) {
    @if (correctAnswer()) {
        <div class="flex items-center justify-center">
            <h2 class="text-2xl font-bold mb-4">Parabéns! Você <span class="text-green-500">acertou</span>!</h2>
        </div>
    }
    @else if (correctAnswer() === false) {
        <div class="flex items-center justify-center">
            <h2 class="text-2xl font-bold mb-4"><span class="text-red-500">Você errou. </span>Tente novamente!</h2>
        </div>
    }
}
