@if (!module) {
  <p>Carregando...</p>
}
@else {
    <div class="min-h-screen p-4" [ngClass]="module?.color">
        <button (click)="back()"> 
            <lucide-angular [img]="Back" class="w-15 h-15 text-red-400"></lucide-angular>
        </button>
        @switch (module?.id) {
            @case ('MathGame') {
                <app-math-game></app-math-game>
            }
            @case ('MemoryGame') {
                <app-memory-game></app-memory-game>
            }
            @case ('SequenceGame') {
                <app-sequence-game></app-sequence-game>
            }
            @case ('BiggerGame') {
                <app-bigger-game></app-bigger-game>
            }
            @case ('ColorGame') {
                <app-color-game></app-color-game>
            }
            @case ('WordGame') {
                <app-word-game></app-word-game>
            }
            @case ('ExpressionGame') {
                <app-expression-game></app-expression-game>
            }
            @case ('AimGame') {
                <app-aim-game></app-aim-game>
            }
        }
    </div>
}
